<h1 class="fontBaloo"> Contact </h1>

<section class="fontMontserrat">
    <div class="left-side">
        <h2> Got a problem to solve? </h2>
        <p> Contact me through this form. I am interested in hearing from you. </p>
        <p> Need a Frontend developer? <b> Contact me </b></p>
    </div>
    <div class="right-side fontMontserrat">
        <form action="" (submit)="onSubmit()">
            <input type="text" name="name" [(ngModel)]="contact.name">
            <input type="email" name="email" [(ngModel)]="contact.email">
            <textarea type="text" name="message" [(ngModel)]="contact.message"></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
</section>
